name: Release Artifacts

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional host version override. Leave empty to auto-increment."
        required: false
        default: ""
        type: string
      target_branch:
        description: "Branch to release from"
        required: true
        default: "main"
        type: string

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump host version
        id: host_version
        run: |
          version="$(python scripts/bump_host_version.py --version "${{ inputs.version }}")"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Validate host version and release tag
        env:
          EXPECTED_VERSION: ${{ steps.host_version.outputs.version }}
          EXPECTED_TAG: ${{ steps.host_version.outputs.tag }}
        run: |
          python - <<'PY'
          import racelink
          import os

          package_version = racelink.__version__
          expected_version = os.environ["EXPECTED_VERSION"]
          expected_tag = os.environ["EXPECTED_TAG"]
          derived_tag = f"v{package_version}"

          if package_version != expected_version:
              raise SystemExit(
                  f"Package version mismatch: {package_version} != {expected_version}"
              )
          if derived_tag != expected_tag:
              raise SystemExit(
                  f"Release tag mismatch: {derived_tag} != {expected_tag}"
              )
          PY

      - name: Fail if tag or release already exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git ls-remote --tags origin "${{ steps.host_version.outputs.tag }}" | grep -q "${{ steps.host_version.outputs.tag }}"; then
            echo "Tag ${{ steps.host_version.outputs.tag }} already exists on origin"
            exit 1
          fi
          if gh release view "${{ steps.host_version.outputs.tag }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release ${{ steps.host_version.outputs.tag }} already exists"
            exit 1
          fi

      - name: Install build frontend
        run: python -m pip install --upgrade build

      - name: Set reproducible build timestamp
        shell: bash
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct "$GITHUB_SHA")" >> "$GITHUB_ENV"

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify stable artifact names
        run: |
          python - <<'PY'
          from pathlib import Path
          from racelink import _build_backend

          dist = Path("dist")
          expected = {
              _build_backend._wheel_name(),
              _build_backend._sdist_name(),
          }
          actual = {path.name for path in dist.iterdir() if path.is_file()}
          missing = expected - actual
          if missing:
              raise SystemExit(f"Missing expected artifacts: {sorted(missing)}")
          PY

      - name: Commit release metadata
        run: |
          git add racelink/_version.py
          if git diff --cached --quiet; then
            echo "Release metadata did not change"
          else
            git commit -m "Release v${{ steps.host_version.outputs.version }}"
          fi

      - name: Create and push release tag
        run: |
          git tag "${{ steps.host_version.outputs.tag }}"
          git push origin "HEAD:${{ inputs.target_branch }}" --follow-tags

      - name: Generate SHA256 file
        run: |
          python - <<'PY'
          from pathlib import Path
          import hashlib

          version = "${{ steps.host_version.outputs.version }}"
          dist = Path("dist")
          artifact_names = [
              f"racelink_host-{version}-py3-none-any.whl",
              f"racelink-host-{version}.tar.gz",
          ]
          lines = []
          for name in artifact_names:
              data = (dist / name).read_bytes()
              digest = hashlib.sha256(data).hexdigest()
              lines.append(f"{digest}  {name}")
          (dist / f"racelink-host-{version}-sha256.txt").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.host_version.outputs.tag }}
          target_commitish: ${{ inputs.target_branch }}
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/*-sha256.txt

      - name: Write workflow summary
        shell: bash
        run: |
          {
            echo "## Release Summary"
            echo
            echo "- Host version: \`${{ steps.host_version.outputs.version }}\`"
            echo "- Host tag: \`${{ steps.host_version.outputs.tag }}\`"
            echo "- Trigger: \`workflow_dispatch\`"
          } >> "$GITHUB_STEP_SUMMARY"
